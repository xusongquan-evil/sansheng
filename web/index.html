<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三省六部 · 任务看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .status-badge { @apply px-2 py-1 rounded text-xs font-semibold; }
    .status-pending { @apply bg-gray-200 text-gray-700; }
    .status-taizi { @apply bg-blue-200 text-blue-700; }
    .status-zhongshu { @apply bg-purple-200 text-purple-700; }
    .status-menxia { @apply bg-yellow-200 text-yellow-700; }
    .status-assigned { @apply bg-cyan-200 text-cyan-700; }
    .status-doing { @apply bg-indigo-200 text-indigo-700; }
    .status-review { @apply bg-pink-200 text-pink-700; }
    .status-done { @apply bg-green-200 text-green-700; }
    .status-cancelled { @apply bg-red-200 text-red-700; }
    .agent-card { @apply bg-white rounded-lg shadow p-4 hover:shadow-md transition; }
    .agent-running { @apply border-l-4 border-green-500; }
    .agent-stopped { @apply border-l-4 border-gray-300; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- 导航栏 -->
  <nav class="bg-gradient-to-r from-red-800 to-red-600 text-white shadow-lg sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold">🏛️ 三省六部 · 任务看板</h1>
          <p class="text-red-200 text-sm mt-1">多 Agent 协作系统实时监控</p>
        </div>
        <div class="flex gap-2">
          <button onclick="toggleAgents()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center">
            🤖 Agent
          </button>
          <button onclick="toggleSystem()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center">
            📊 系统
          </button>
          <button onclick="loadTasks()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center">
            🔄 刷新
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 任务统计 -->
  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="statsGrid"></div>
  </div>

  <!-- Agent 状态面板（可折叠） -->
  <div id="agentPanel" class="hidden max-w-7xl mx-auto px-4 mb-6">
    <div class="bg-white rounded-lg shadow p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-gray-800">🤖 Agent 状态</h2>
        <button onclick="loadAgents()" class="text-sm text-red-600 hover:text-red-800">🔄 刷新</button>
      </div>
      <div id="agentList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="text-center py-8 text-gray-500">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 系统监控面板（可折叠） -->
  <div id="systemPanel" class="hidden max-w-7xl mx-auto px-4 mb-6">
    <div class="bg-white rounded-lg shadow p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-gray-800">📊 系统监控</h2>
        <button onclick="loadSystemStatus()" class="text-sm text-red-600 hover:text-red-800">🔄 刷新</button>
      </div>
      <div id="systemStatus" class="space-y-4">
        <div class="text-center py-8 text-gray-500">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 筛选器 -->
  <div class="max-w-7xl mx-auto px-4 mb-6">
    <div class="bg-white rounded-lg shadow p-4">
      <div class="flex flex-wrap gap-2">
        <button onclick="filterTasks('all')" class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-white" data-filter="all">全部</button>
        <button onclick="filterTasks('active')" class="filter-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300" data-filter="active">进行中</button>
        <button onclick="filterTasks('done')" class="filter-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300" data-filter="done">已完成</button>
        <input type="text" id="searchBox" placeholder="搜索任务..." class="flex-1 min-w-64 px-4 py-2 border rounded-lg" oninput="searchTasks()">
      </div>
    </div>
  </div>

  <!-- 任务列表 -->
  <div class="max-w-7xl mx-auto px-4 pb-8">
    <div id="taskList" class="space-y-4"></div>
    <div id="loading" class="text-center py-12">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600 mx-auto"></div>
      <p class="text-gray-500 mt-4">加载中...</p>
    </div>
    <div id="empty" class="hidden text-center py-12">
      <svg class="w-24 h-24 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <p class="text-gray-500 mt-4">暂无任务</p>
    </div>
  </div>

  <!-- 任务详情弹窗 -->
  <div id="taskModal" class="hidden fixed inset-0 bg-black/50 z-50 overflow-y-auto" onclick="if(event.target===this)closeModal()">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full my-8" onclick="event.stopPropagation()">
        <div class="bg-gradient-to-r from-red-800 to-red-600 text-white px-6 py-4 rounded-t-xl flex justify-between items-center">
          <h3 class="text-xl font-bold" id="modalTitle">任务详情</h3>
          <button onclick="closeModal()" class="text-white/80 hover:text-white text-2xl">&times;</button>
        </div>
        <div class="p-6" id="modalContent"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // 切换 Agent 面板
    function toggleAgents() {
      const panel = document.getElementById('agentPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden') && document.getElementById('agentList').children.length === 0) {
        loadAgents();
      }
    }

    // 切换系统面板
    function toggleSystem() {
      const panel = document.getElementById('systemPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden') && document.getElementById('systemStatus').children.length === 0) {
        loadSystemStatus();
      }
    }

    // 加载 Agent 列表
    async function loadAgents() {
      const container = document.getElementById('agentList');
      container.innerHTML = '<div class="col-span-full text-center py-4 text-gray-500">加载中...</div>';
      
      try {
        const response = await fetch('http://10.1.0.9:7851/api/agents/list?t=' + Date.now());
        const data = await response.json();
        
        if (data.agents && data.agents.length > 0) {
          container.innerHTML = '';
          data.agents.forEach(agent => {
            const isRunning = agent.status === 'running';
            const isMain = agent.isMain;
            container.innerHTML += `
              <div class="agent-card ${isRunning ? 'agent-running' : 'agent-stopped'}">
                <div class="flex justify-between items-start">
                  <div class="flex-1">
                    <div class="font-semibold text-gray-800 truncate">${agent.label || '未命名 Agent'}</div>
                    <div class="text-xs text-gray-500 mt-1">${agent.kind || 'unknown'}</div>
                  </div>
                  <span class="px-2 py-1 rounded text-xs font-semibold ${isRunning ? 'bg-green-200 text-green-700' : 'bg-gray-200 text-gray-700'}">
                    ${isRunning ? '● 运行中' : '○ 已停止'}
                  </span>
                </div>
                <div class="mt-3 text-xs text-gray-600 space-y-1">
                  <div>模型：${agent.model || '-'}</div>
                  <div>Tokens: ${agent.totalTokens?.toLocaleString() || 0}</div>
                  ${agent.contextTokens ? `<div>上下文：${agent.contextTokens.toLocaleString()}</div>` : ''}
                </div>
              </div>
            `;
          });
        } else {
          container.innerHTML = '<div class="col-span-full text-center py-8 text-gray-500">暂无 Agent 数据</div>';
        }
      } catch (error) {
        container.innerHTML = `<div class="col-span-full text-center py-8 text-red-500">加载失败：${error.message}</div>`;
      }
    }

    // 加载系统状态
    async function loadSystemStatus() {
      const container = document.getElementById('systemStatus');
      container.innerHTML = '<div class="text-center py-4 text-gray-500">加载中...</div>';
      
      try {
        const response = await fetch('http://10.1.0.9:7851/api/system/status?t=' + Date.now());
        const data = await response.json();
        
        let html = '<div class="grid md:grid-cols-2 gap-6">';
        
        // 服务状态
        html += '<div>';
        html += '<h3 class="font-bold text-gray-700 mb-3">🔧 服务状态</h3>';
        html += '<div class="space-y-2">';
        
        for (const [name, info] of Object.entries(data.services || {})) {
          const isUp = info.status === 'running';
          html += `
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
              <div>
                <div class="font-medium">${name}</div>
                <div class="text-xs text-gray-500">${info.response_time_ms ? `响应：${info.response_time_ms}ms` : info.details || ''}</div>
              </div>
              <span class="px-2 py-1 rounded text-xs font-semibold ${isUp ? 'bg-green-200 text-green-700' : 'bg-red-200 text-red-700'}">
                ${isUp ? '● 正常' : '○ 异常'}
              </span>
            </div>
          `;
        }
        html += '</div></div>';
        
        // 任务统计
        html += '<div>';
        html += '<h3 class="font-bold text-gray-700 mb-3">📋 任务统计</h3>';
        const tasks = data.summary?.tasks || {};
        html += `
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-blue-50 p-3 rounded text-center">
              <div class="text-2xl font-bold text-blue-600">${tasks.total || 0}</div>
              <div class="text-xs text-gray-600">总任务</div>
            </div>
            <div class="bg-green-50 p-3 rounded text-center">
              <div class="text-2xl font-bold text-green-600">${tasks.done || 0}</div>
              <div class="text-xs text-gray-600">已完成</div>
            </div>
            <div class="bg-yellow-50 p-3 rounded text-center">
              <div class="text-2xl font-bold text-yellow-600">${tasks.in_progress || 0}</div>
              <div class="text-xs text-gray-600">进行中</div>
            </div>
            <div class="bg-red-50 p-3 rounded text-center">
              <div class="text-2xl font-bold text-red-600">${tasks.cancelled || 0}</div>
              <div class="text-xs text-gray-600">已取消</div>
            </div>
          </div>
        `;
        html += '</div></div>';
        
        html += '</div>';
        html += `<div class="text-xs text-gray-500 mt-4 text-center">最后更新：${data.timestamp || '-'}</div>`;
        
        container.innerHTML = html;
      } catch (error) {
        container.innerHTML = `<div class="text-center py-8 text-red-500">加载失败：${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
