<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三省六部 · 任务看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .status-badge { @apply px-2 py-1 rounded text-xs font-semibold; }
    .status-pending { @apply bg-gray-200 text-gray-700; }
    .status-taizi { @apply bg-blue-200 text-blue-700; }
    .status-zhongshu { @apply bg-purple-200 text-purple-700; }
    .status-menxia { @apply bg-yellow-200 text-yellow-700; }
    .status-assigned { @apply bg-cyan-200 text-cyan-700; }
    .status-doing { @apply bg-indigo-200 text-indigo-700; }
    .status-review { @apply bg-pink-200 text-pink-700; }
    .status-done { @apply bg-green-200 text-green-700; }
    .status-cancelled { @apply bg-red-200 text-red-700; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-gradient-to-r from-red-800 to-red-600 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold">🏛️ 三省六部 · 任务看板</h1>
          <p class="text-red-200 text-sm mt-1">多 Agent 协作系统实时监控</p>
        </div>
        <button onclick="loadTasks()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition flex items-center">
          🔄 刷新
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-6">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4" id="statsGrid"></div>
  </div>

  <div class="max-w-7xl mx-auto px-4 mb-6">
    <div class="bg-white rounded-lg shadow p-4">
      <div class="flex flex-wrap gap-2">
        <button onclick="filterTasks('all')" class="filter-btn px-4 py-2 rounded-lg bg-gray-800 text-white" data-filter="all">全部</button>
        <button onclick="filterTasks('active')" class="filter-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300" data-filter="active">进行中</button>
        <button onclick="filterTasks('done')" class="filter-btn px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300" data-filter="done">已完成</button>
        <input type="text" id="searchBox" placeholder="搜索任务..." class="flex-1 min-w-64 px-4 py-2 border rounded-lg" oninput="searchTasks()">
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 pb-8">
    <div id="taskList" class="space-y-4"></div>
    <div id="loading" class="text-center py-12">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600 mx-auto"></div>
      <p class="text-gray-500 mt-4">加载中...</p>
    </div>
    <div id="empty" class="hidden text-center py-12">
      <svg class="w-24 h-24 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <p class="text-gray-500 mt-4">暂无任务</p>
    </div>
  </div>

  <div id="taskModal" class="hidden fixed inset-0 bg-black/50 z-50 overflow-y-auto" onclick="if(event.target===this)closeModal()">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full my-8" onclick="event.stopPropagation()">
        <div class="bg-gradient-to-r from-red-800 to-red-600 text-white px-6 py-4 rounded-t-xl flex justify-between items-center">
          <h3 class="text-xl font-bold" id="modalTitle">任务详情</h3>
          <button onclick="closeModal()" class="text-white/80 hover:text-white text-2xl">&times;</button>
        </div>
        <div class="p-6" id="modalContent"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
