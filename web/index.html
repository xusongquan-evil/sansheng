<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>军机处 · 三省六部总控台</title>
  <meta name="version" content="2026-03-30-v3">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap');
    :root{
      --bg:#07090f;--panel:#0f1219;--panel2:#141824;--line:#1c2236;
      --text:#dde4f8;--muted:#5a6b92;--ok:#2ecc8a;--warn:#f5c842;--danger:#ff5270;
      --acc:#6a9eff;--acc2:#a07aff;
    }
    html.light{
      --bg:#f4f5f7;--panel:#ffffff;--panel2:#ebedf0;--line:#d8dce6;
      --text:#1a1d26;--muted:#6b7280;--ok:#16a34a;--warn:#d97706;--danger:#dc2626;
      --acc:#3b82f6;--acc2:#7c3aed;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:"PingFang SC",Inter,-apple-system,"Segoe UI",sans-serif;min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2538;border-radius:4px}

    .wrap{max-width:1400px;margin:0 auto;padding:16px}

    /* HEADER */
    .hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line)}
    .logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#6a9eff,#a07aff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{font-size:11px;color:var(--muted)}
    .hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .chip{font-size:11px;padding:3px 9px;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:var(--muted)}
    .chip.ok{border-color:#2ecc8a44;color:var(--ok)}.chip.warn{border-color:#f5c84244;color:var(--warn)}.chip.err{border-color:#ff527044;color:var(--danger)}
    .btn-refresh{font-size:11px;padding:4px 10px;border:1px solid var(--acc);border-radius:6px;background:transparent;color:var(--acc);cursor:pointer}
    .btn-refresh:hover{background:#0a1228}
    #cd{font-size:11px;color:var(--muted)}

    /* TABS */
    .tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--line);overflow-x:auto}
    .tab{font-size:13px;padding:8px 16px;border-radius:8px 8px 0 0;cursor:pointer;color:var(--muted);border:1px solid transparent;border-bottom:none;white-space:nowrap;position:relative;bottom:-1px;transition:all .15s;user-select:none}
    .tab:hover{color:var(--text);background:var(--panel)}
    .tab.active{color:var(--text);background:var(--panel);border-color:var(--line);font-weight:600}
    .tbadge{font-size:10px;padding:1px 5px;border-radius:999px;background:#1a2040;color:var(--acc);margin-left:4px}
    .panel{display:none}.panel.active{display:block}

    /* ══ 旨意看板 ══ */
    .edict-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
    .edict-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .15s,transform .1s,box-shadow .15s}
    .edict-card:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 4px 20px rgba(106,158,255,.1)}
    .edict-card.archived{opacity:.6;border-style:dashed}

    /* pipeline strip on card */
    .ec-pipe{display:flex;align-items:center;gap:0;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
    .ep-node{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 8px;border-radius:6px;flex-shrink:0;min-width:52px}
    .ep-node.done{background:#0a2018}
    .ep-node.active{background:#0f1a38;border:1px solid var(--acc)}
    .ep-node.pending{opacity:.3}
    .ep-icon{font-size:14px}
    .ep-name{font-size:9px;color:var(--muted);white-space:nowrap}
    .ep-node.done .ep-name{color:var(--ok)}
    .ep-node.active .ep-name{color:var(--acc);font-weight:700}
    .ep-arrow{font-size:10px;color:#1c2236;padding:0 1px;flex-shrink:0}

    .ec-id{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:.04em;margin-bottom:5px}
    .ec-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:10px;color:var(--text)}
    .ec-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
    .tag{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid;display:inline-block;white-space:nowrap}

    /* state colors */
    .st-Taizi{border-color:#e8a04044;color:#e8a040;background:#281a08}
    .st-Zhongshu{border-color:#a07aff44;color:#a07aff;background:#110a28}
    .st-Menxia{border-color:#ff9a6a44;color:#ff9a6a;background:#280f0a}
    .st-Shangshu{border-color:#6aef9a44;color:#6aef9a;background:#0a2018}
    .st-Done{border-color:#2ecc8a44;color:var(--ok);background:#0a2018}
    .st-Cancelled{border-color:#88888844;color:#888;background:#1a1a1a}

    /* dept colors */
    .dt-太子{border-color:#e8a04044;color:#e8a040;background:#281a08}
    .dt-中书省{border-color:#a07aff44;color:#a07aff;background:#1a0f38}
    .dt-门下省{border-color:#6a9eff44;color:#6a9eff;background:#0f1a38}
    .dt-尚书省{border-color:#6aef9a44;color:#6aef9a;background:#0a2018}
    .dt-完成{border-color:#2ecc8a44;color:var(--ok);background:#0a2018}

    .ec-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:6px}
    .hb{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--line)}
    .hb.active{border-color:#2ecc8a44;color:var(--ok)}.hb.warn{border-color:#f5c84244;color:var(--warn)}.hb.stalled{border-color:#ff527044;color:var(--danger);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* ══ 省部调度 ══ */
    .duty-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
    .duty-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:border-color .15s}
    .duty-card:hover{border-color:#2e3d6a}
    .duty-card.active-card{border-color:var(--acc)}

    .dc-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--panel2);border-bottom:1px solid var(--line)}
    .dc-emoji{font-size:22px}
    .dc-info{flex:1}
    .dc-name{font-size:14px;font-weight:800}
    .dc-role{font-size:10px;color:var(--muted)}
    .dc-status{display:flex;align-items:center;gap:5px;font-size:11px}
    .dc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dc-dot.active{background:var(--ok)}.dc-dot.busy{background:var(--warn);animation:pulse 1.5s infinite}.dc-dot.idle{background:#2a3a5a}

    .dc-body{padding:14px 16px}
    .dc-idle{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;padding:6px 0}
    .dc-task-id{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:.04em}
    .dc-task-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
    .dc-task-now{font-size:12px;color:var(--muted);line-height:1.5;margin-top:2px}

    .dc-footer{padding:8px 16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;background:var(--panel2)}
    .dc-model{font-size:10px;color:var(--muted)}.dc-count{font-size:10px;color:var(--acc);margin-left:auto}

    /* ══ SYSTEM STATUS ══ */
    .sys-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .sys-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
    .sys-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .sys-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:12px}
    .sys-row:last-child{border-bottom:none}
    .sys-label{color:var(--muted)}
    .sys-value{font-weight:600}
    .sys-ok{color:var(--ok)}.sys-warn{color:var(--warn)}.sys-err{color:var(--danger)}

    /* ══ MODAL ══ */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;backdrop-filter:blur(3px);overflow-y:auto}
    .modal-bg.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 16px}
    .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:100%;max-width:760px;padding:28px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6)}
    .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:18px;color:var(--muted)}
    .modal-close:hover{background:var(--panel2);color:var(--text)}
    .modal-id{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:.04em;margin-bottom:6px}
    .modal-title{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:18px}

    /* full pipeline in modal */
    .m-pipe{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:16px;background:var(--panel2);border-radius:12px;margin-bottom:20px}
    .mp-stage{display:flex;align-items:center;flex-shrink:0}
    .mp-node{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:10px;min-width:80px;position:relative}
    .mp-node.done{background:#0a2018;border:1px solid #2ecc8a44}
    .mp-node.active{background:#0f1838;border:2px solid var(--acc);box-shadow:0 0 14px rgba(106,158,255,.2)}
    .mp-node.pending{opacity:.25;border:1px dashed var(--line)}
    .mp-icon{font-size:22px}
    .mp-dept{font-size:12px;font-weight:700;margin-top:2px}
    .mp-node.done .mp-dept{color:var(--ok)}
    .mp-node.active .mp-dept{color:var(--acc)}
    .mp-node.pending .mp-dept{color:var(--muted)}
    .mp-action{font-size:10px;color:var(--muted);margin-top:1px}
    .mp-arrow{color:#1c2236;font-size:18px;padding:0 6px;margin-top:-10px}

    /* flow log */
    .fl-timeline{display:flex;flex-direction:column;gap:0;position:relative;margin-top:18px}
    .fl-timeline::before{content:'';position:absolute;left:60px;top:0;bottom:0;width:1px;background:var(--line)}
    .fl-item{display:flex;gap:0;position:relative;padding:8px 0}
    .fl-time{min-width:60px;font-size:10px;color:var(--muted);text-align:right;padding-right:14px;flex-shrink:0;padding-top:3px}
    .fl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;position:relative;z-index:1;background:var(--acc)}
    .fl-content{padding-left:12px;flex:1}
    .fl-who{font-size:12px;margin-bottom:2px}
    .fl-who .from{font-weight:700}
    .fl-who .to{font-weight:700}
    .fl-rem{font-size:11px;color:var(--muted);line-height:1.5}
    .fl-ok{color:var(--ok)}.fl-warn{color:var(--warn)}.fl-blue{color:var(--acc)}

    /* ══ STATS ══ */
    .stats-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
    .stat-chip{font-size:12px;padding:6px 14px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--muted)}
    .stat-chip.active{border-color:var(--acc);color:var(--text)}
    .stat-num{font-weight:700;margin-left:4px}

    /* THEME TOGGLE */
    .theme-toggle{position:fixed;top:16px;right:16px;background:var(--panel);border:1px solid var(--line);border-radius:8px;cursor:pointer;font-size:14px;padding:6px 12px;color:var(--text);z-index:50}
    .theme-toggle:hover{background:var(--panel2)}

    /* EMPTY */
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

    /* TOAST */
    #toast{position:fixed;bottom:20px;right:20px;font-size:13px;padding:10px 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.4);display:none;z-index:200}
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  <div id="toast"></div>

  <div class="wrap">
    <!-- HEADER -->
    <div class="hdr">
      <div>
        <div class="logo">🏛️ 军机处 · 三省六部总控台</div>
        <div class="sub">多 Agent 协作系统实时监控</div>
      </div>
      <div class="hdr-r">
        <span class="chip ok" id="statusChip">● 系统正常</span>
        <span id="cd">刷新倒计时: 30s</span>
        <button class="btn-refresh" onclick="loadAll()">🔄 刷新</button>
      </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar" id="statsBar">
      <span class="stat-chip active">全部 <span class="stat-num" id="statTotal">0</span></span>
      <span class="stat-chip">进行中 <span class="stat-num" id="statActive">0</span></span>
      <span class="stat-chip">已完成 <span class="stat-num" id="statDone">0</span></span>
      <span class="stat-chip">待审议 <span class="stat-num" id="statMenxia">0</span></span>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('kanban')">📋 旨意看板 <span class="tbadge" id="kanbanBadge">0</span></div>
      <div class="tab" onclick="switchTab('duty')">🔭 省部调度</div>
      <div class="tab" onclick="switchTab('system')">📊 系统监控</div>
      <div class="tab" onclick="switchTab('archive')">📜 奏折阁</div>
    </div>

    <!-- ══ KANBAN PANEL ══ -->
    <div class="panel active" id="panel-kanban">
      <div class="edict-grid" id="edictGrid">
        <div class="empty">加载中...</div>
      </div>
    </div>

    <!-- ══ DUTY PANEL ══ -->
    <div class="panel" id="panel-duty">
      <div class="duty-grid" id="dutyGrid">
        <div class="empty">加载中...</div>
      </div>
    </div>

    <!-- ══ SYSTEM PANEL ══ -->
    <div class="panel" id="panel-system">
      <div class="sys-grid" id="sysGrid">
        <div class="empty">加载中...</div>
      </div>
    </div>

    <!-- ══ ARCHIVE PANEL ══ -->
    <div class="panel" id="panel-archive">
      <div class="edict-grid" id="archiveGrid">
        <div class="empty">加载中...</div>
      </div>
    </div>
  </div>

  <!-- ══ MODAL ══ -->
  <div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-close" onclick="closeModal()">×</div>
      <div class="modal-id" id="mId"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="m-pipe" id="mPipe"></div>
      <div class="fl-timeline" id="mFlow"></div>
    </div>
  </div>

  <script>
    let tasks = [];
    let countdown = 30;
    let theme = 'dark';

    // Theme toggle
    function toggleTheme() {
      theme = theme === 'dark' ? 'light' : 'dark';
      document.documentElement.className = theme;
      document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '🌙' : '☀️';
    }

    // Tab switching
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab:nth-child(${getTabIndex(name)})`).classList.add('active');
      document.getElementById(`panel-${name}`).classList.add('active');
    }
    function getTabIndex(name) {
      return {kanban:1,duty:2,system:3,archive:4}[name]||1;
    }

    // Load all data
    async function loadAll() {
      countdown = 30;
      await loadTasks();
      await loadSystem();
      renderAll();
    }

    // Load tasks
    async function loadTasks() {
      try {
        const res = await fetch('/data/tasks.json?t=' + Date.now());
        tasks = await res.json();
        tasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      } catch(e) {
        console.error('加载任务失败:', e);
        tasks = [];
      }
    }

    // Load system
    async function loadSystem() {
      try {
        const res = await fetch('http://10.1.0.9:7851/api/system/status?t=' + Date.now());
        const data = await res.json();
        renderSystem(data);
      } catch(e) {
        console.error('加载系统状态失败:', e);
      }
    }

    // Render all
    function renderAll() {
      renderStats();
      renderKanban();
      renderDuty();
      renderArchive();
      document.getElementById('kanbanBadge').textContent = tasks.filter(t => t.state !== 'Done' && t.state !== 'Cancelled').length;
    }

    // Stats
    function renderStats() {
      const active = tasks.filter(t => t.state !== 'Done' && t.state !== 'Cancelled').length;
      const done = tasks.filter(t => t.state === 'Done').length;
      const menxia = tasks.filter(t => t.state === 'Menxia').length;
      document.getElementById('statTotal').textContent = tasks.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statDone').textContent = done;
      document.getElementById('statMenxia').textContent = menxia;
    }

    // Pipeline strip (for card)
    function renderPipeStrip(task) {
      const stages = ['Taizi','Zhongshu','Menxia','Shangshu','Done'];
      const icons = {Taizi:'👑',Zhongshu:'📜',Menxia:'🔍',Shangshu:'📮',Done:'✅'};
      const names = {Taizi:'太子',Zhongshu:'中书',Menxia:'门下',Shangshu:'尚书',Done:'完成'};
      const current = stages.indexOf(task.state);
      let html = '';
      stages.forEach((s,i) => {
        const status = i < current ? 'done' : (i === current ? 'active' : 'pending');
        html += `<div class="ep-node ${status}"><div class="ep-icon">${icons[s]}</div><div class="ep-name">${names[s]}</div></div>`;
        if (i < stages.length - 1) html += `<div class="ep-arrow">→</div>`;
      });
      return html;
    }

    // Kanban cards
    function renderKanban() {
      const active = tasks.filter(t => t.state !== 'Done' && t.state !== 'Cancelled');
      const grid = document.getElementById('edictGrid');
      if (active.length === 0) {
        grid.innerHTML = '<div class="empty">暂无进行中的旨意</div>';
        return;
      }
      grid.innerHTML = active.map(t => `
        <div class="edict-card" onclick="openModal('${t.id}')">
          <div class="ec-pipe">${renderPipeStrip(t)}</div>
          <div class="ec-id">${t.id}</div>
          <div class="ec-title">${t.title}</div>
          <div class="ec-meta">
            <span class="tag st-${t.state}">${t.state}</span>
            <span class="tag dt-${t.org}">${t.org}</span>
          </div>
          <div class="ec-footer">
            <span class="hb active">🟢 活跃</span>
            <span style="font-size:10px;color:var(--muted)">${formatTime(t.updatedAt)}</span>
          </div>
        </div>
      `).join('');
    }

    // Duty panel
    function renderDuty() {
      const depts = {
        taizi: {emoji:'👑',name:'太子',role:'消息分拣'},
        zhongshu: {emoji:'📜',name:'中书省',role:'方案规划'},
        menxia: {emoji:'🔍',name:'门下省',role:'审议封驳'},
        shangshu: {emoji:'📮',name:'尚书省',role:'执行回奏'}
      };
      const grid = document.getElementById('dutyGrid');
      grid.innerHTML = Object.entries(depts).map(([id,d]) => {
        const deptTasks = tasks.filter(t => 
          (id === 'taizi' && t.state === 'Taizi') ||
          (id === 'zhongshu' && t.state === 'Zhongshu') ||
          (id === 'menxia' && t.state === 'Menxia') ||
          (id === 'shangshu' && (t.state === 'Shangshu' || t.state === 'Assigned' || t.state === 'Doing'))
        );
        const current = deptTasks[0];
        return `
          <div class="duty-card ${current ? 'active-card' : ''}">
            <div class="dc-hdr">
              <div class="dc-emoji">${d.emoji}</div>
              <div class="dc-info">
                <div class="dc-name">${d.name}</div>
                <div class="dc-role">${d.role}</div>
              </div>
              <div class="dc-status">
                <div class="dc-dot ${current ? 'busy' : 'idle'}"></div>
                <span>${current ? '执行中' : '候命'}</span>
              </div>
            </div>
            <div class="dc-body">
              ${current ? `
                <div class="dc-task-id">${current.id}</div>
                <div class="dc-task-title">${current.title}</div>
                <div class="dc-task-now">${current.now || ''}</div>
              ` : `
                <div class="dc-idle">○ 候命状态 · 无待处理旨意</div>
              `}
            </div>
            <div class="dc-footer">
              <span class="dc-model">模型: glm-5</span>
              <span class="dc-count">任务: ${deptTasks.length}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Archive panel
    function renderArchive() {
      const done = tasks.filter(t => t.state === 'Done' || t.state === 'Cancelled');
      const grid = document.getElementById('archiveGrid');
      if (done.length === 0) {
        grid.innerHTML = '<div class="empty">暂无奏折</div>';
        return;
      }
      grid.innerHTML = done.map(t => `
        <div class="edict-card archived" onclick="openModal('${t.id}')">
          <div class="ec-id">${t.id}</div>
          <div class="ec-title">${t.title}</div>
          <div class="ec-meta">
            <span class="tag st-${t.state}">${t.state}</span>
          </div>
          <div class="ec-footer">
            <span style="font-size:10px;color:var(--ok)">✅ 已完成</span>
            <span style="font-size:10px;color:var(--muted)">${formatTime(t.updatedAt)}</span>
          </div>
        </div>
      `).join('');
    }

    // System panel
    function renderSystem(data) {
      const grid = document.getElementById('sysGrid');
      grid.innerHTML = `
        <div class="sys-card">
          <div class="sys-title">📊 任务统计</div>
          <div class="sys-row"><span class="sys-label">总任务</span><span class="sys-value">${data.summary?.tasks?.total || tasks.length}</span></div>
          <div class="sys-row"><span class="sys-label">已完成</span><span class="sys-value sys-ok">${data.summary?.tasks?.done || 0}</span></div>
          <div class="sys-row"><span class="sys-label">进行中</span><span class="sys-value sys-warn">${data.summary?.tasks?.in_progress || 0}</span></div>
        </div>
        <div class="sys-card">
          <div class="sys-title">🔧 服务状态</div>
          <div class="sys-row"><span class="sys-label">看板服务</span><span class="sys-value sys-ok">● 正常</span></div>
          <div class="sys-row"><span class="sys-label">API 服务</span><span class="sys-value sys-ok">● 正常</span></div>
          <div class="sys-row"><span class="sys-label">响应时间</span><span class="sys-value">${data.services?.kanban?.response_time_ms || '-'} ms</span></div>
        </div>
        <div class="sys-card">
          <div class="sys-title">🤖 Agent 配置</div>
          <div class="sys-row"><span class="sys-label">默认模型</span><span class="sys-value">glm-5</span></div>
          <div class="sys-row"><span class="sys-label">Agent 数量</span><span class="sys-value">5</span></div>
          <div class="sys-row"><span class="sys-label">部门数量</span><span class="sys-value">4</span></div>
        </div>
      `;
      document.getElementById('statusChip').className = 'chip ok';
      document.getElementById('statusChip').textContent = '● 系统正常';
    }

    // Modal
    function openModal(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      document.getElementById('mId').textContent = task.id;
      document.getElementById('mTitle').textContent = task.title;
      document.getElementById('mPipe').innerHTML = renderFullPipe(task);
      document.getElementById('mFlow').innerHTML = renderFlowLog(task);
      document.getElementById('modalBg').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalBg').classList.remove('open');
    }

    function renderFullPipe(task) {
      const stages = ['Taizi','Zhongshu','Menxia','Shangshu','Done'];
      const icons = {Taizi:'👑',Zhongshu:'📜',Menxia:'🔍',Shangshu:'📮',Done:'✅'};
      const names = {Taizi:'太子',Zhongshu:'中书省',Menxia:'门下省',Shangshu:'尚书省',Done:'完成'};
      const actions = {Taizi:'分拣',Zhongshu:'规划',Menxia:'审议',Shangshu:'执行',Done:'回奏'};
      const current = stages.indexOf(task.state);
      let html = '';
      stages.forEach((s,i) => {
        const status = i < current ? 'done' : (i === current ? 'active' : 'pending');
        html += `<div class="mp-stage">
          <div class="mp-node ${status}">
            <div class="mp-icon">${icons[s]}</div>
            <div class="mp-dept">${names[s]}</div>
            <div class="mp-action">${actions[s]}</div>
          </div>
          ${i < stages.length - 1 ? '<div class="mp-arrow">→</div>' : ''}
        </div>`;
      });
      return html;
    }

    function renderFlowLog(task) {
      if (!task.flow_log || task.flow_log.length === 0) return '<div class="empty">无流转记录</div>';
      return task.flow_log.map(f => `
        <div class="fl-item">
          <div class="fl-time">${formatTime(f.at)}</div>
          <div class="fl-dot" style="background:${f.to === '完成' ? 'var(--ok)' : 'var(--acc)'}"></div>
          <div class="fl-content">
            <div class="fl-who"><span class="from">${f.from}</span> → <span class="to">${f.to}</span></div>
            <div class="fl-rem ${f.to === '完成' ? 'fl-ok' : ''}">${f.remark}</div>
          </div>
        </div>
      `).join('');
    }

    // Utils
    function formatTime(s) {
      if (!s) return '-';
      const d = new Date(s);
      return d.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    }

    // Countdown
    function tick() {
      countdown--;
      document.getElementById('cd').textContent = `刷新倒计时: ${countdown}s`;
      if (countdown <= 0) {
        loadAll();
        countdown = 30;
      }
    }

    // Init
    loadAll();
    setInterval(tick, 1000);
  </script>
</body>
</html>
